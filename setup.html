<!DOCTYPE html>
<html>
<head>
  <title>FinOrbit Bank Setup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="setup-page">
 
  <div class="setup-container">
    <h1>Set Up Your Bank Details</h1>
    <p>Select what you want to track in FinOrbit</p>
 
    <label>Bank Name</label>
    <input type="text" id="bank" placeholder="Example: SBI, HDFC, ICICI">
 
    <label>Account Type</label>
    <select id="accountType">
      <option value="">Select Account Type</option>
      <option>Savings Account</option>
      <option>Current Account</option>
      <option>Salary Account</option>
      <option>Credit Card</option>
      <option>Loan Account</option>
    </select>
 
    <label>Current Balance</label>
    <input type="number" id="balance" placeholder="Enter current balance">
 
    <label>What do you want to track?</label>
 
    <div class="checkbox-group">
      <label><input type="checkbox"> Expenses</label>
      <label><input type="checkbox"> Savings</label>
      <label><input type="checkbox"> Investments</label>
      <label><input type="checkbox"> Loans</label>
      <label><input type="checkbox"> Credit Cards</label>
      <label><input type="checkbox"> Goals</label>
    </div>
 
    <button onclick="saveSetup()">Continue to Dashboard</button>
  </div>
 
<script src="script.js"></script>
</body>
</html>
