<!DOCTYPE html>
<html>
<head>
  <title>Bank Setup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="setup-page">
 
<div class="setup-container">
  <h1>Set Up Bank Details</h1>
  <p>Add what you want to track</p>
 
  <label>Bank Name</label>
  <input type="text" id="bank" placeholder="Example: SBI, HDFC, ICICI">
 
  <label>Account Type</label>
  <select id="accountType">
    <option value="">Select Account Type</option>
    <option>Savings Account</option>
    <option>Salary Account</option>
    <option>Current Account</option>
    <option>Credit Card</option>
    <option>Loan Account</option>
  </select>
 
  <label>Current Balance</label>
  <input type="number" id="balance" placeholder="Enter balance">
 
  <label>Monthly Income</label>
  <input type="number" id="income" placeholder="Enter monthly income">
 
  <label>Monthly Expense</label>
  <input type="number" id="expense" placeholder="Enter monthly expense">
 
  <button id="saveSetupBtn">Save & Continue</button>
</div>
 
<script type="module" src="script.js"></script>
</body>
</html>
