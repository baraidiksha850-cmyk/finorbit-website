<!DOCTYPE html>
<html>
<head>
  <title>FinOrbit Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
<nav>
  <h2>FinOrbit</h2>
  <ul>
    <li><a href="setup.html">Edit Bank Setup</a></li>
    <li><a href="#" id="logoutBtn">Logout</a></li>
  </ul>
</nav>
 
<section class="hero">
  <h1>Welcome to FinOrbit</h1>
  <p>Your personal financial health dashboard</p>
</section>
 
<section>
  <h2>Your Bank Details</h2>
 
  <div class="cards">
    <div class="card">
      <h3 id="bankName">-</h3>
      <p>Bank Name</p>
    </div>
 
    <div class="card">
      <h3 id="accountTypeText">-</h3>
      <p>Account Type</p>
    </div>
 
    <div class="card">
      <h3 id="balanceText">₹0</h3>
      <p>Current Balance</p>
    </div>
 
    <div class="card">
      <h3 id="healthScore">0%</h3>
      <p>Health Score</p>
    </div>
  </div>
</section>
 
<section>
  <h2>Monthly Tracking</h2>
 
  <table>
    <tr>
      <th>Income</th>
      <th>Expense</th>
      <th>Savings</th>
    </tr>
    <tr>
      <td id="incomeText">₹0</td>
      <td id="expenseText">₹0</td>
      <td id="savingText">₹0</td>
    </tr>
  </table>
</section>
 
<footer>
  © 2026 FinOrbit | Royal Rajasthani Theme
</footer>
 
<script type="module" src="script.js"></script>
</body>
</html>
